<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #fdfaf3;
            --ink: #1a1a1a;
            --seal-red: #8b0000;
        }

        body {
            background-color: #e5e7eb;
            font-family: 'Crimson Pro', serif;
            color: var(--ink);
            line-height: 1.6;
        }

        .paper {
            background-color: var(--parchment);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .paper::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(to right, transparent, rgba(139, 0, 0, 0.2), transparent);
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
        }

        /* Styling for Markdown-generated content */
        .content p:first-of-type::first-letter {
            float: left;
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            line-height: 1;
            padding-right: 12px;
            color: var(--seal-red);
            font-weight: 700;
        }

        .content h2 {
            display: block;
            text-align: center;
            margin: 2rem 0 1rem;
            font-weight: 600;
            font-variant: small-caps;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #ddd;
            width: 50%;
            margin-left: auto;
            margin-right: auto;
            font-size: 1.25rem;
        }

        .content h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .signature-line {
            border-top: 1px solid var(--ink);
            width: 250px;
            margin-top: 3rem;
        }

        @media print {
            body { background: white; }
            .paper { box-shadow: none; margin: 0; width: 100%; }
        }
    </style>
</head>
<body class="py-12 px-4">

    <div class="max-w-3xl mx-auto paper p-8 md:p-16 rounded-sm">
        
        <header class="text-center mb-12 border-b-2 border-double border-gray-300 pb-8">
            <h1 class="text-3xl md:text-5xl font-bold mb-4">{{ page.title }}</h1>
            <p class="italic text-gray-700 text-lg">{{ page.recipient }}</p>
        </header>

        <article class="text-xl text-justify content">
            {{ content }}

            <div class="mt-16">
                <p>Respectfully submitted,</p>
                <div class="signature-line"></div>
                <p class="mt-2 font-semibold">{{ page.author | default: "A Concerned Citizen" }}</p>
            </div>
        </article>

        <footer class="mt-24 text-center text-sm text-gray-500 italic">
            <p>Published in the Year of Our Lord {{ "now" | date: "%Y" }}</p>
        </footer>
    </div>

</body>
</html>