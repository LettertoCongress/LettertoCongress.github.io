<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --vellum: #f7f2e4;
            --ink: #1e1a14;
            --faded: #6b5e47;
            --crease: #d9cdb4;
        }

        body {
            background-color: #3b3530;
            font-family: 'Cormorant Garamond', serif;
            color: var(--ink);
            padding: 3rem 1rem 5rem;
        }

        .paper {
            background-color: var(--vellum);
            max-width: 640px;
            margin: 0 auto;
            padding: 4rem 4.5rem 5rem;
            box-shadow:
                0 1px 2px rgba(0,0,0,0.08),
                0 8px 32px rgba(0,0,0,0.35),
                inset 0 0 120px rgba(180,150,90,0.07);
            position: relative;
        }

        /* Faint horizontal line texture like aged laid paper */
        .paper::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(
                180deg,
                transparent,
                transparent 24px,
                rgba(0,0,0,0.022) 24px,
                rgba(0,0,0,0.022) 25px
            );
            pointer-events: none;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(1.5rem, 3.5vw, 2.2rem);
            line-height: 1.25;
            color: var(--ink);
            margin-bottom: 0.6rem;
        }

        header p {
            font-family: 'Cormorant SC', serif;
            font-weight: 300;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: var(--faded);
            margin-top: 0.5rem;
        }

        /* thin rule under header */
        header::after {
            content: '';
            display: block;
            width: 60px;
            border-bottom: 1px solid var(--crease);
            margin: 1.2rem auto 0;
        }

        /* ── BODY ── */
        .content {
            font-size: 1.05rem;
            font-weight: 300;
            line-height: 1.9;
            color: var(--ink);
        }

        .content p {
            margin-bottom: 1.1rem;
            text-align: justify;
            hyphens: auto;
        }

        /* Drop cap */
        .content p:first-of-type::first-letter {
            float: left;
            font-family: 'Cormorant Garamond', serif;
            font-size: 4.2rem;
            font-weight: 400;
            font-style: italic;
            line-height: 0.82;
            padding-right: 0.08em;
            padding-top: 0.05em;
            color: var(--faded);
        }

        /* Section headings — understated, centered small caps */
        .content h2 {
            font-family: 'Cormorant SC', serif;
            font-weight: 300;
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-align: center;
            color: var(--faded);
            margin: 2.2rem 0 1rem;
        }

        .content h3 {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 1.05rem;
            color: var(--faded);
            margin: 1.5rem 0 0.5rem;
        }

        .content strong { font-weight: 600; }
        .content em { font-style: italic; }

        /* ── CLOSING ── */
        .content > div {
            margin-top: 3rem;
            font-style: italic;
            color: var(--faded);
            font-size: 0.98rem;
            line-height: 1.8;
        }

        .content > div p {
            text-align: left;
            margin-bottom: 0.3rem;
        }

        .signature-line {
            border-top: 1px solid var(--crease);
            width: 160px;
            margin-top: 2rem;
            margin-bottom: 0.4rem;
        }

        /* ── FOOTER ── */
        footer {
            margin-top: 3.5rem;
            text-align: center;
        }

        footer p {
            font-family: 'Cormorant SC', serif;
            font-weight: 300;
            font-size: 0.62rem;
            letter-spacing: 0.18em;
            color: var(--crease);
        }

        @media (max-width: 520px) {
            .paper { padding: 2.5rem 1.8rem 3rem; }
            h1 { font-size: 1.4rem; }
        }

        @media print {
            body { background: white; padding: 0; }
            .paper { box-shadow: none; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="paper">

        <header>
            <h1>{{ page.title }}</h1>
            <p>{{ page.recipient }}</p>
        </header>

        <article class="content">
            {{ content }}

            <div>
                <p>Respectfully submitted,</p>
                <div class="signature-line"></div>
                <p>{{ page.author | default: "A Concerned Citizen" }}</p>
            </div>
        </article>

        <footer>
            <p>Published in the Year of Our Lord {{ "now" | date: "%Y" }}</p>
        </footer>

    </div>

</body>
</html>
